<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Clock App</title>
</head>
<body>
  <main>
    <div class="text-container">
      <div class="text-author">
        <p class="text">
          “The science of operations, as derived from mathematics more especially, is a science of itself, and has its own abstract truth and value.”
        </p>

        <span class="author">Ada Lovelace</span>
      </div>
      
      <button class="reload-btn"><img src="./assets/desktop/icon-refresh.svg" alt=""></button>
    </div>

    <div class="time-container">
      <div class="time-text-container">
        <div class="greeting-container">
          <img src="" class="icon" alt="">
          <h3 class="greeting-text">GOOD MORNING</h3>
        </div>

        <div class="time-display-container">
          <time>11:37</time>
          <span>BST</span>
        </div>

        <div class="place-container">
          <span class="place">IN LONDON, UK</span>
        </div>
      </div>

      <div class="more-less-container">
        <button class="more-less-btn">MORE</button>
      </div>
    </div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
