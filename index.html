<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Clock App</title>
</head>
<body>
  <main>
    <div class="top-side">
      <figure class="quote-container">
        <!-- <div class="quote-author">
          <blockquote class="quote">
            <p>
               “The science of operations, as derived from mathematics more especially, is a science of itself, and has its own abstract truth and value.”
            </p>
          </blockquote>

          <figcaption class="author">Ada Lovelace</figcaption>
        </div>
        
        <button class="reload-btn"><img src="./assets/desktop/icon-refresh.svg" alt=""></button> -->
      </figure>

      <div class="time-container">
        <div class="time-text-container">
          <div class="greeting-container">
            <img src="./assets/desktop/icon-sun.svg" class="icon" alt="">
            <p class="greeting-text">GOOD MORNING</p>
          </div>

          <div class="time-display-container">
            <time class="time">11:37</time>
            <span class="summer-time-text">BST</span>
          </div>

          <div class="place-container">
            <span class="place">IN LONDON, UK</span>
          </div>
        </div>

        <button class="more-less-btn">MORE <img class="arrow" src="./assets/desktop/arrow-down.svg" alt=""></button>
      </div>
    </div>

    <div class="bottom-side hidden">
      <div class="info-container">
        <dl class="info-content">
          <div class="info-item">
            <dt class="info-text">CURRENT TIMEZONE</dt>
            <dd class="info-value">Europe/London</dd>
          </div>

          <div class="info-item">
            <dt class="info-text">DAY OF THE YEAR</dt>
            <dd class="info-value">295</dd>
          </div>

          <div class="info-item">
            <dt class="info-text">DAY OF THE WEEK</dt>
            <dd class="info-value">5</dd>
          </div>

          <div class="info-item">
            <dt class="info-text">WEEK NUMBER</dt>
            <dd class="info-value">42</dd>
          </div>
        </dl>
      </div>
    </div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
